<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playing Cards</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<main id="playing-cards">

  <div class="card">
    <div class="left">
      <span>A</span>
      <span>♠</span>
    </div>

    <div class="middle">
      <span>♠</span>
    </div>

    <div class="right">
      <span>A</span>
      <span>♠</span>
    </div>
  </div>

  <div class="card">
    <div class="left red">
      <span>A</span>
      <span>♥</span>
    </div>

    <div class="middle red">
      <span>♥</span>
    </div>

    <div class="right red">
      <span>A</span>
      <span>♥</span>
    </div>
  </div>

  <div class="card">
    <div class="left">
      <span>A</span>
      <span>♣</span>
    </div>

    <div class="middle">
      <span>♣</span>
    </div>

    <div class="right">
      <span>A</span>
      <span>♣</span>
    </div>
  </div>

</main>

</body>
</html>
